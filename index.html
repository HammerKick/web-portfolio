<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-in  { opacity: 0; animation: fadeInUp 0.7s ease forwards; }
      .delay-1  { animation-delay: 0.1s; }
      .delay-2  { animation-delay: 0.3s; }
      .delay-3  { animation-delay: 0.5s; }
      .delay-4  { animation-delay: 0.7s; }
    </style>
  </head>
  <body class="bg-gradient-to-r from-green-600 to-green-700 font-serif">
    <div class="flex flex-row gap-8 justify-center mt-8 fade-in delay-1">
      <div class="transition-all duration-300 hover:scale-110">
        <img src="images/AntoineBournier.jpg" class="w-128 rounded-lg"/>
      </div>
      <div class="flex flex-col justify-center items-center mt-4">
        <h1 class="text-6xl font-bold">Antoine Bournier</h1>
        <h2 class="text-3xl">Développeur full stack</h2>
        <h2 class="text-xl">bournierantoine@gmail.com</h2>
        <h2 class="flex flex-row mt-4 gap-2">
          <img src="images/Flag_of_France.svg.webp" class="w-24"/>
          <img src="images/uk.svg" class="w-24"/>
        </h2>
      </div>
    </div>

    <div class="flex flex-row gap-8 justify-center mt-8 fade-in delay-4 text-xl font-semibold">
      Passionné d'informatique et de jeux vidéo, mon objectif est de créer des interfaces et des applications utiles et fluides en suivant mes passions et ma créativité
    </div>

    <div class="grid grid-cols-6 gap-4 mt-8 justify-items-center">
      <div class="col-span-2 w-full max-w-md bg-gradient-to-r from-green-400 to-green-600 rounded-xl shadow-lg border border-black p-6 fade-in delay-2 transition-all duration-300 ease-in-out hover:scale-110 hover:shadow-2xl hover:shadow-black/50 cursor-pointer">
        <div class="text-2xl font-bold font-mono text-center">Front end / Frameworks</div>
        <div class="grid grid-cols-4 text-sm mt-4 gap-2">
          <img src="images/HTML5_logo_and_wordmark.png"  class="w-24 h-24 object-contain mx-auto"/>
          <img src="images/JavaScript-Logo.png"          class="w-24 h-24 object-contain mx-auto"/>
          <img src="images/CSS3_logo_and_wordmark.png"   class="w-24 h-24 object-contain mx-auto"/>
          <img src="images/Typescript_logo_.png"         class="w-22 h-22 object-contain mx-auto"/>
          <img src="images/reactlogo.png"                class="w-24 h-24 object-contain mx-auto"/>
          <img src="images/angular.png"                  class="w-24 h-24 object-contain mx-auto"/>
          <img src="images/vue.png"                      class="w-24 h-24 object-contain mx-auto"/>
          <img src="images/tailwind.png"                 class="w-24 h-24 object-contain mx-auto"/>
        </div>
      </div>
      <div class="col-span-2 w-full max-w-md bg-gradient-to-r from-green-400 to-green-600 rounded-xl shadow-lg border border-black p-6 fade-in delay-3 transition-all duration-300 ease-in-out hover:scale-110 hover:shadow-2xl hover:shadow-black/50 cursor-pointer">
        <div class="text-2xl font-bold font-mono text-center">Back end / Bases de données</div>
        <div class="grid grid-cols-3 text-sm mt-4 gap-2">
          <img src="images/Java_Logo.svg"               class="w-24 h-24 object-contain mx-auto"/>
          <img src="images/PHP.png"                     class="w-24 h-24 object-contain mx-auto"/>
          <img src="images/symfony.png"                 class="w-24 h-24 object-contain mx-auto"/>
          <img src="images/Sql_data_base_with_logo.png" class="w-24 h-24 object-contain mx-auto"/>
          <img src="images/Postgresql.svg"              class="w-24 h-24 object-contain mx-auto"/>
          <img src="images/MySQL.png"                   class="w-24 h-24 object-contain mx-auto"/>
        </div>
      </div>
      <div class="col-span-2 w-full max-w-md bg-gradient-to-r from-green-400 to-green-600 rounded-xl shadow-lg border border-black p-6 fade-in delay-4 transition-all duration-300 ease-in-out hover:scale-110 hover:shadow-2xl hover:shadow-black/50 cursor-pointer">
        <div class="text-4xl font-bold font-mono text-center">Autres</div>
        <div class="grid grid-cols-2 text-sm mt-4 gap-2">
          <img src="images/excel.png" class="w-24 h-24 object-contain mx-auto"/>
          <img src="images/vba.jpg"   class="w-24 h-24 object-contain mx-auto"/>
        </div>
      </div>
    </div>

  </body>
</html>
